<section class="contact-section">
  <div class="container">
    <div class="contact-wrapper">
      <!-- Left side: contact info & benefits -->
      <div class="contact-info">
        <span class="badge">Get in touch</span>
        <h2>Let's <span class="gradient-text">Collaborate</span></h2>
        <p>Have a project in mind? I'm just a message away.</p>
        <div class="contact-details">
          <div class="contact-item">
            <img src="assets/images/icons/arrow.svg" alt="mail" width="20" />
            <span>alex@morgan.dev</span>
          </div>
          <div class="contact-item">
            <img src="assets/images/icons/arrow.svg" alt="phone" width="20" />
            <span>+1 (415) 867-5309</span>
          </div>
          <div class="contact-item">
            <img
              src="assets/images/icons/arrow.svg"
              alt="location"
              width="20"
            />
            <span>San Francisco, CA</span>
          </div>
        </div>
        <div class="social-links">
          <a href="#" aria-label="GitHub"
            ><img src="assets/images/skills/github.svg" alt="GitHub" width="28"
          /></a>
          <a href="#" aria-label="LinkedIn"
            ><img
              src="assets/images/icons/linkedin.svg"
              alt="LinkedIn"
              width="28"
          /></a>
          <a href="#" aria-label="Instagram"
            ><img
              src="assets/images/icons/instagram.svg"
              alt="Instagram"
              width="28"
          /></a>
        </div>
        <!-- Optional: simple illustration -->
        <div class="contact-illustration">
          <svg
            width="80"
            height="80"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4Z"
              stroke="var(--primary)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M22 7L12 13L2 7"
              stroke="var(--primary)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>

      <!-- Right side: contact form -->
      <div class="contact-form" id="contactFormWrapper">
        <form id="contactForm">
          <div class="form-group">
            <input type="text" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <input type="email" placeholder="Email address" required />
          </div>
          <div class="form-group">
            <input type="text" placeholder="Subject (optional)" />
          </div>
          <div class="form-group">
            <textarea
              placeholder="Tell me about your project..."
              rows="4"
            ></textarea>
          </div>
          <button type="submit" class="btn-primary">Send Message →</button>
        </form>
      </div>
    </div>
  </div>
</section>
