<!-- Video Hero Section -->
<section class="video-hero">
  <video autoplay muted loop playsinline class="bg-video">
    <source src="assets/videos/hero-video.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>
  <div class="video-overlay"></div>
  <div class="video-content">
    <h1>Let's <span class="gradient-text">Connect</span></h1>
    <p>
      Have a project in mind? Reach out and let's create something amazing
      together.
    </p>
  </div>
</section>

<!-- Contact Form Section -->
<section class="contact-page-section">
  <div class="container">
    <div class="contact-page-grid">
      <div class="contact-info-panel">
        <span class="badge">Get in touch</span>
        <h2>
          Let's create something <span class="gradient-text">amazing</span>
        </h2>
        <p>
          I'm always open to discussing new projects, creative ideas or
          opportunities to collaborate.
        </p>
        <div class="contact-details">
          <div class="contact-item">
            <img src="assets/images/icons/arrow.svg" alt="mail" width="20" />
            <span>alex@morgan.dev</span>
          </div>
          <div class="contact-item">
            <img src="assets/images/icons/arrow.svg" alt="phone" width="20" />
            <span>+1 (415) 867-5309</span>
          </div>
          <div class="contact-item">
            <img
              src="assets/images/icons/arrow.svg"
              alt="location"
              width="20"
            />
            <span>San Francisco, CA</span>
          </div>
        </div>
        <div class="social-links-footer">
          <a href="#" aria-label="GitHub"
            ><img src="assets/images/skills/github.svg" alt="GitHub" width="28"
          /></a>
          <a href="#" aria-label="LinkedIn"
            ><img
              src="assets/images/icons/linkedin.svg"
              alt="LinkedIn"
              width="28"
          /></a>
          <a href="#" aria-label="Instagram"
            ><img
              src="assets/images/icons/instagram.svg"
              alt="Instagram"
              width="28"
          /></a>
        </div>
      </div>
      <div class="contact-form-card">
        <form id="contactFormPage">
          <input type="text" placeholder="Full name" required />
          <input type="email" placeholder="Email address" required />
          <textarea
            rows="5"
            placeholder="Tell me about your project..."
          ></textarea>
          <button type="submit" class="btn-primary">Send message →</button>
        </form>
      </div>
    </div>
  </div>
</section>
